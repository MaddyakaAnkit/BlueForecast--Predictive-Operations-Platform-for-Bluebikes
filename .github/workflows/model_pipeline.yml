name: Model Pipeline CI

on:
  push:
    paths:
      - 'Model-Pipeline/**'
      - 'Data-Pipeline/src/data_processing/feature_engineering.py'
  pull_request:
    paths:
      - 'Model-Pipeline/**'
  workflow_dispatch:

jobs:
  test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r Model-Pipeline/requirements.txt
      - name: Lint (ruff)
        run: ruff check Model-Pipeline/src/ Model-Pipeline/dags/
      - name: Unit tests
        run: pytest Model-Pipeline/tests/test_model_pipeline.py -v --tb=short

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Airflow + MLflow images
        working-directory: Model-Pipeline
        run: docker compose -f docker-compose.yaml build --no-cache

  notify:
    name: Pipeline Notifications
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Notify Slack on failure
        if: needs.test.result == 'failure' && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":red_circle: *Model Pipeline CI Failed*\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on success (main only)
        if: needs.test.result == 'success' && github.ref == 'refs/heads/main' && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: Model Pipeline CI passed on main — `${{ github.sha }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create GitHub Issue on failure (fallback)
        if: needs.test.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Model Pipeline CI Failed — ${context.sha.substring(0, 7)}`,
              body: `**Branch:** \`${context.ref}\`\n**Author:** ${context.actor}\n**Run:** [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['ci-failure', 'model-pipeline'],
            });